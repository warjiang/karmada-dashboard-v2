# RBAC Configuration for OIDC Groups
#
# Apply these ClusterRoleBindings to your Karmada API server to enable
# group-based access control for OIDC users.
#
# Usage:
#   kubectl --kubeconfig ~/.kube/karmada.config apply -f rbac.yaml

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-admins
  labels:
    app: karmada-dashboard
    auth: oidc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: Group
  name: admins
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-developers
  labels:
    app: karmada-dashboard
    auth: oidc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: Group
  name: developers
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-viewers
  labels:
    app: karmada-dashboard
    auth: oidc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: Group
  name: viewers
  apiGroup: rbac.authorization.k8s.io
