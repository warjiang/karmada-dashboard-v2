
name: Release Workflow

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  IMAGE_REPO: karmada

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-22.04
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Determine image tag
        id: determine-tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=${{ github.sha }}
          fi
          echo "tag=$TAG" &gt;&gt; $GITHUB_OUTPUT
          echo "image_tag=$TAG"
      
      - name: Build and push images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/karmada-dashboard-api:${{ steps.determine-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/karmada-dashboard-web:${{ steps.determine-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/karmada-dashboard-terminal:${{ steps.determine-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/kubernetes-dashboard-api:${{ steps.determine-tag.outputs.tag }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Update Helm Chart values
        if: github.event_name == 'push'
        run: |
          TAG=${{ steps.determine-tag.outputs.tag }}
          echo "Updating Helm Chart with tag: $TAG"
          sed -i "s/karmadaDashboardImageVersion: .*/karmadaDashboardImageVersion: $TAG/" charts/karmada-dashboard/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/karmada-dashboard/values.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update image tag to $TAG"
            git push || echo "Failed to push, this is expected for tags"
          fi
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release ${{ steps.determine-tag.outputs.tag }}
          draft: false
          prerelease: false
